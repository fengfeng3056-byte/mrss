    for(let i=0; i<10; i++) {
        let rx = tower.x + (seededRandom(rs++) * 2000 - 1000);
        let ry = tower.y + (seededRandom(rs++) * 2000 - 1000);
        resources.push(new Resource(rx, ry, ['wood', 'iron', 'screw'][Math.floor(seededRandom(rs++) * 3)]));
    }

    npcs.push(new NPC(player.x - 80, player.y - 80, true)); 
    npcs.push(new NPC(player.x + 80, player.y - 120, false));
    
    let seed = 999;
    for (let i = 0; i < 8; i++) {
        zombies.push(new Zombie(player.x + (seededRandom(seed++)*250 - 125), player.y - 180 - seededRandom(seed++)*40, 'normal1'));
    }
}

function safeGameLoop(time) {
    try {
        gameLoop(time);
    } catch (err) {
        let overlay = document.getElementById('error-overlay');
        if (overlay) {
            overlay.style.display = 'block';
            overlay.innerHTML = `⚠️ 引擎崩溃拦截成功<br><br>错误信息:<br>${err.message}<br><br>可能原因: 你放入了不符合尺寸规范的长条帧图，尝试调整图片或检查报错。`;
        }
        console.error("Game Loop Error:", err);
    }
}

function gameLoop(time) {
    // 【核心新增】：剧情触发时彻底冻结游戏逻辑
    if (isGamePaused) {
        lastTime = time; // 记录时间戳，防止解除暂停时人物大瞬移
        requestAnimationFrame(safeGameLoop);
        return; 
    }

    let dt = time - lastTime; 
    lastTime = time; 
    let targets = [player];
    for (let i=0; i<npcs.length; i++) {
        if (npcs[i].hp > 0) {
            targets.push(npcs[i]);
        }
    }
    
    if (dt > 100) dt = 16.6; 
    
    if (performance.now() > alertHideTime) { 
        let alertDiv = document.getElementById('center-alert'); 
        if (alertDiv && alertDiv.style.opacity === '1') {
            alertDiv.style.opacity = '0'; 
        }
    }

    let pGridX = Math.floor(player.x / FOG_TILE_SIZE); 
    let pGridY = Math.floor(player.y / FOG_TILE_SIZE); 
    let vTiles = Math.ceil(player.visionRadius / FOG_TILE_SIZE);
    
    for(let dx = -vTiles; dx <= vTiles; dx++) {
        for(let dy = -vTiles; dy <= vTiles; dy++) {
            if (Math.hypot(dx * FOG_TILE_SIZE, dy * FOG_TILE_SIZE) <= player.visionRadius) {
                fogSet.add(`${pGridX + dx},${pGridY + dy}`);
            }
        }
    }

    if (gameState === 'intro') {
        joystick.active = true; 
        joystick.vectorX = 0; 
        joystick.vectorY = 1; 
        
        player.x += joystick.vectorX * player.speed; 
        player.y += joystick.vectorY * player.speed;
        
        resolvePhysics(player); 
        
        for (let i=0; i<npcs.length; i++) npcs[i].update(dt);
        
        if (gunDrop && Math.hypot(player.x - gunDrop.x, player.y - gunDrop.y) < 60) { 
            gunDrop = null; 
            player.hasGun = true; 
            gameState = 'tutorial'; 
            joystick.active = false; 
            joystick.vectorX = 0; 
            joystick.vectorY = 0; 
        }
        
        for (let i=0; i<zombies.length; i++) zombies[i].update(dt, time, targets);
    }

    if (gameState === 'playing') {
        if (tutorialPhase === 'kill_2_zombies' && kills >= 2) { 
            tutorialPhase = 'fix_tower1'; 
            // 【触发弹窗】
            showDialog("发现可修复的防御塔，搜集4个材料来修复它吧，它能帮助击杀丧尸。");
        }
        if (tutorialPhase === 'fix_tower1' && tower.state === 'active') {
            tutorialPhase = 'gather'; 
            showCenterAlert("📡 防御塔启动！塔下放散落了建材，请收集以部署新防线！", "#00ffcc", 5000);
        }
        if (tutorialPhase === 'gather' && totalResourcesCollected >= 4) { 
            tutorialPhase = 'build_tower2'; 
            tower2 = new Tower(tower.x + GameConfig.tower2.offsetX, tower.y + GameConfig.tower2.offsetY, "2号防线"); 
            showCenterAlert("📍 资源充足！已解锁新防线建设许可", "#00ffcc", 4000); 
        }
        if (tutorialPhase === 'build_tower2' && tower2 && tower2.state === 'active' && !gate) {
            tutorialPhase = 'gather_walls'; 
            gate = new Gate(tower.x, tower.y, tower2.x, tower2.y); 
            showCenterAlert("⛩️ 大门启动！收集物资建墙！", "#ffcc00", 5000);
        }
        if (tutorialPhase === 'gather_walls' && totalResourcesCollected >= 7) { 
            tutorialPhase = 'build_walls'; 
            wallBuilder = new WallBuilder(tower.x - 120, tower.y + 60); 
            showCenterAlert("📍 建材充足！前往塔旁部署围墙", "#00ffcc", 5000); 
        }
        if (siegeStarted && !bossSpawnedInSiege && performance.now() - siegeStartTime >= 8000) { 
            bossSpawnedInSiege = true; 
            zombies.push(new Zombie(tower.x - 1200, tower.y - 1200, 'boss')); 
            showCenterAlert("☠️ 警告！巨型变异体加入战场！", "#800080", 6000); 
        }
        if (performance.now() >= hordeStartTime || tutorialPhase === 'done') { 
            let cn = 0;
            for (let i=0; i<zombies.length; i++) {
                if (zombies[i].hp > 0 && zombies[i].type !== 'boss') cn++;
            }
            for (let i = 0; i < 40 - cn; i++) { 
                let angle = Math.random() * Math.PI * 2; 
                let dist = (Math.max(width, height) / 2 + 200 + Math.random() * 500); 
                zombies.push(new Zombie(player.x + Math.cos(angle) * dist, player.y + Math.sin(angle) * dist, 'siege')); 
            } 
        }
        
        if (player.hp > 0) {
            player.x += joystick.vectorX * player.speed; 
            player.y += joystick.vectorY * player.speed; 
            resolvePhysics(player);
            
            if (player.hasGun) {
                let targetZombie = null; 
                let closestDist = Infinity;
                for (let i=0; i<zombies.length; i++) { 
                    let z = zombies[i];
                    if (z.hp <= 0 || z.state === 'dead_idle') continue; 
                    let d = Math.hypot(z.x - player.x, z.y - player.y); 
                    if (d < player.attackRadius && d < closestDist) { 
                        closestDist = d; 
                        targetZombie = z; 
                    } 
                }
                if (targetZombie && time - player.lastShotTime > player.shotInterval) { 
                    bullets.push(new Bullet(player.x, player.y, targetZombie)); 
                    player.lastShotTime = time; 
                }
            }
        }
        
        for (let i = resources.length - 1; i >= 0; i--) { 
            let res = resources[i]; 
            res.update(dt); 
            let dist = Math.hypot(player.x - res.x, player.y - res.y); 
            if (dist < res.pickupRadius + 40 && player.hp > 0) { 
                player.inventory[res.type] += 3; 
                totalResourcesCollected++; 
                if (tutorialPhase === 'gather_walls') wallResourcesCollected++; 
                addDamageText(res.x, res.y - 40, "+3", '#ffcc00', null); 
                resources.splice(i, 1); 
            } 
        }
        
        let inHealZone = false; 
        if (tower) {
            tower.update(dt, time);
            if (tower.state === 'active' && Math.hypot(player.x - tower.x, player.y - tower.y) <= tower.attackRadius) inHealZone = true;
        }
        if (tower2) {
            tower2.update(dt, time);
            if (tower2.state === 'active' && Math.hypot(player.x - tower2.x, player.y - tower2.y) <= tower2.attackRadius) inHealZone = true;
        }

        let isRepairingWall = false;
        for (let i=0; i<walls.length; i++) { 
            let w = walls[i];
            w.update(dt); 
            if (w.hp < w.maxHp) { 
                let dist = Math.hypot(player.x - w.x, player.y - w.y); 
                if (dist < 150) { 
                    w.hp += 8 * (dt / 1000); 
                    if (w.hp > w.maxHp) w.hp = w.maxHp; 
                    isRepairingWall = true; 
                    if (Math.random() < 0.05) { 
                        addDamageText(w.x + (Math.random()*40-20), w.y - 60, "+1", '#00ff00', '#ffffff'); 
                    } 
                } 
            } 
        }

        if (inHealZone && player.hp > 0 && player.hp < player.maxHp) { 
            player.isHealing = true; 
            if (time - player.lastHealTime > 1000) { 
                player.hp = Math.min(player.maxHp, player.hp + 10); 
                player.lastHealTime = time; 
                addDamageText(player.x, player.y - 80, "+10", '#00ff00', '#ffffff'); 
            } 
        } else { 
            player.isHealing = isRepairingWall; 
        }

        if (wallBuilder) wallBuilder.update(dt, time); 
        if (gate) gate.update(dt); 
        for (let i=0; i<zombies.length; i++) zombies[i].update(dt, time, targets); 
        for (let i=0; i<bullets.length; i++) bullets[i].update(); 
        for (let i=0; i<npcs.length; i++) npcs[i].update(dt);
        
        let hpPercent = Math.max(0, player.hp) / player.maxHp; 
        let hpColorHUD = hpPercent > 0.5 ? 'linear-gradient(90deg, #00aa55, #00ffaa)' : (hpPercent > 0.2 ? 'linear-gradient(90deg, #cc7700, #ffaa00)' : 'linear-gradient(90deg, #990033, #ff0055)');
        
        let hpBarFill = document.getElementById('hp-bar-fill'); 
        if (hpBarFill) { 
            hpBarFill.style.width = (hpPercent * 100) + '%'; 
            hpBarFill.style.background = hpColorHUD; 
            document.getElementById('hp-text').innerText = `${Math.max(0, Math.floor(player.hp))}/${player.maxHp}`; 
            document.getElementById('val-wood').innerText = player.inventory.wood; 
            document.getElementById('val-iron').innerText = player.inventory.iron; 
            document.getElementById('val-screw').innerText = player.inventory.screw; 
        }
    }

    let isMoving = joystick.active && (joystick.vectorX !== 0 || joystick.vectorY !== 0); 
    let isShooting = (time - player.lastShotTime < 300) && player.hasGun;
    let newState = 'idle'; 
    if (isMoving && isShooting) newState = 'move_shoot'; 
    else if (isMoving) newState = 'move'; 
    else if (isShooting) newState = 'shoot'; 
    else newState = 'idle';
    
    if (player.state !== newState) { 
        player.state = newState; 
        player.frameX = 0; 
        player.frameTimer = 0; 
    }
    
    if (gameState === 'intro') { 
        player.facingRight = true; 
    } else if (isMoving) { 
        player.facingRight = (joystick.vectorX > 0); 
    }
    
    if (gameState === 'playing' || gameState === 'intro') { 
        player.frameTimer += dt; 
        if (player.frameTimer > player.frameInterval) { 
            let maxF = player.framesConfig[player.state] || 1;
            player.frameX = (player.frameX + 1) % maxF; 
            player.frameTimer = 0; 
        } 
    }

    ctx.clearRect(0, 0, width, height); 
    let cx = width/2; 
    let cy = height/2;
    
    if (ASSETS.bg.complete && ASSETS.bg.naturalWidth > 0) { 
        let bgW = ASSETS.bg.width || 512; 
        let bgH = ASSETS.bg.height || 512; 
        let offsetX = (player.x % bgW + bgW) % bgW; 
        let offsetY = (player.y % bgH + bgH) % bgH; 
        for (let x = -offsetX; x < width; x += bgW) { 
            for (let y = -offsetY; y < height; y += bgH) { 
                ctx.drawImage(ASSETS.bg, x, y, bgW, bgH); 
            } 
        }
    } else { 
        ctx.strokeStyle = '#333'; 
        ctx.lineWidth = 2; 
        let gridSize = 150; 
        let offsetX = (player.x % gridSize + gridSize) % gridSize; 
        let offsetY = (player.y % gridSize + gridSize) % gridSize; 
        ctx.beginPath(); 
        for(let i = -offsetX; i < width; i += gridSize) { 
            ctx.moveTo(i, 0); 
            ctx.lineTo(i, height); 
        } 
        for(let i = -offsetY; i < height; i += gridSize) { 
            ctx.moveTo(0, i); 
            ctx.lineTo(width, i); 
        } 
        ctx.stroke(); 
    }
    
    if (tower && tower.state === 'active') {
        let tGridX = Math.floor(tower.x / FOG_TILE_SIZE); 
        let tGridY = Math.floor(tower.y / FOG_TILE_SIZE);
        if (fogSet.has(`${tGridX},${tGridY}`) || gameState === 'intro') {
            let tx = tower.x - player.x + cx; 
            let ty = tower.y - player.y + cy; 
            let pulseRadius = tower.attackRadius + Math.sin(time/200)*10;
            ctx.fillStyle = 'rgba(0, 255, 100, 0.05)'; 
            ctx.beginPath(); 
            ctx.arc(tx, ty, tower.attackRadius, 0, Math.PI*2); 
            ctx.fill();
            ctx.strokeStyle = 'rgba(0, 255, 150, 0.3)'; 
            ctx.lineWidth = 2; 
            ctx.beginPath(); 
            ctx.arc(tx, ty, pulseRadius, 0, Math.PI*2); 
            ctx.stroke();
        }
    }

    if (tower2 && tower2.state === 'active') {
        let tGridX = Math.floor(tower2.x / FOG_TILE_SIZE); 
        let tGridY = Math.floor(tower2.y / FOG_TILE_SIZE);
        if (fogSet.has(`${tGridX},${tGridY}`) || gameState === 'intro') {
            let tx = tower2.x - player.x + cx; 
            let ty = tower2.y - player.y + cy; 
            let pulseRadius = tower2.attackRadius + Math.sin(time/200)*10;
            ctx.fillStyle = 'rgba(0, 255, 100, 0.05)'; 
            ctx.beginPath(); 
            ctx.arc(tx, ty, tower2.attackRadius, 0, Math.PI*2); 
            ctx.fill();
            ctx.strokeStyle = 'rgba(0, 255, 150, 0.3)'; 
            ctx.lineWidth = 2; 
            ctx.beginPath(); 
            ctx.arc(tx, ty, pulseRadius, 0, Math.PI*2); 
            ctx.stroke();
        }
    }

    if (player.hp > 0 && gameState !== 'intro') { 
        ctx.strokeStyle = 'rgba(255, 255, 0, 0.1)'; 
        ctx.beginPath(); 
        ctx.arc(cx, cy, player.aggroRadius, 0, Math.PI*2); 
        ctx.stroke(); 
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.2)'; 
        ctx.lineWidth = 2; 
        ctx.beginPath(); 
        ctx.arc(cx, cy, player.attackRadius, 0, Math.PI*2); 
        ctx.stroke(); 
        ctx.lineWidth = 1; 
    }

    if (gunDrop) { 
        let gGridX = Math.floor(gunDrop.x / FOG_TILE_SIZE); 
        let gGridY = Math.floor(gunDrop.y / FOG_TILE_SIZE); 
        if (fogSet.has(`${gGridX},${gGridY}`) || gameState === 'intro') { 
            let gx = gunDrop.x - player.x + cx; 
            let gy = gunDrop.y - player.y + cy; 
            let pulse = 20 + Math.sin(time / 150) * 10; 
            ctx.shadowColor = '#ffff00'; 
            ctx.shadowBlur = 20; 
            ctx.fillStyle = '#ffff00'; 
            ctx.beginPath(); 
            ctx.arc(gx, gy, pulse, 0, Math.PI*2); 
            ctx.fill(); 
            ctx.shadowBlur = 0; 
            ctx.fillStyle = 'black'; 
            // 【自适应修复】
            ctx.font = 'bold 36px sans-serif'; 
            ctx.fillText("🔫手枪", gx - 30, gy - 30); 
        } 
    }

    let renderList = [];
    if (tower) renderList.push({ id: 'tower', obj: tower, y: tower.y + 120 }); 
    if (tower2) renderList.push({ id: 'tower2', obj: tower2, y: tower2.y + 120 });
    if (gate) renderList.push({ id: 'gate', obj: gate, y: Math.max(gate.y1, gate.y2) }); 
    if (wallBuilder) renderList.push({ id: 'wallBuilder', obj: wallBuilder, y: wallBuilder.y });
    
    for(let i=0; i<sceneParts.length; i++) renderList.push({ id: 'part', obj: sceneParts[i], y: sceneParts[i].y + sceneParts[i].colOffsetY }); 
    for(let i=0; i<walls.length; i++) renderList.push({ id: 'wall', obj: walls[i], y: walls[i].y });
    
    if (player.hp > 0) renderList.push({ id: 'player', y: player.y + 40 }); 
    
    for(let i=0; i<npcs.length; i++) renderList.push({ id: 'npc', obj: npcs[i], y: npcs[i].y + 45 }); 
    
    for(let i=0; i<zombies.length; i++) {
        let z = zombies[i];
        renderList.push({ id: 'zombie', obj: z, y: z.y + (z.state === 'dead_idle' ? -10 : (z.type === 'boss' ? z.size * 0.875 : 45)) });
    }
    for(let i=0; i<resources.length; i++) renderList.push({ id: 'resource', obj: resources[i], y: resources[i].y }); 

    renderList.sort(function(a, b) {
        return a.y - b.y;
    });

    for (let i=0; i<renderList.length; i++) {
        let ent = renderList[i];
        if (ent.id === 'tower' || ent.id === 'tower2' || ent.id === 'resource' || ent.id === 'gate' || ent.id === 'wall' || ent.id === 'part' || ent.id === 'wallBuilder') { 
            ent.obj.draw(ent.obj.x - player.x + cx, ent.obj.y - player.y + cy); 
        } 
        else if (ent.id === 'npc' || ent.id === 'zombie') { 
            ent.obj.draw(ent.obj.x - player.x + cx, ent.obj.y - player.y + cy); 
        } 
        else if (ent.id === 'player') {
            let drawX = cx - 64 + player.spriteOffsetX; 
            let drawY = cy - 64 + player.spriteOffsetY;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.beginPath(); 
            ctx.ellipse(cx, cy + 45, 35, 18, 0, 0, Math.PI*2); 
            ctx.fill();
            
            if (player.isHealing && gameState === 'playing') { 
                ctx.save(); 
                ctx.translate(cx, cy); 
                let healPulse = 40 + Math.sin(time / 100) * 15; 
                ctx.beginPath(); 
                ctx.arc(0, 0, healPulse, 0, Math.PI * 2); 
                ctx.fillStyle = 'rgba(0, 255, 100, 0.15)'; 
                ctx.fill(); 
                ctx.strokeStyle = 'rgba(0, 255, 100, 0.6)'; 
                ctx.lineWidth = 2; 
                ctx.stroke(); 
                ctx.restore(); 
            }
            if (gameState !== 'intro') { 
                ctx.fillStyle = 'black'; 
                ctx.fillRect(cx - 40, cy - 70 + player.spriteOffsetY, 80, 10); 
                let hpPercent = Math.max(0, player.hp) / player.maxHp; 
                let hpColor = hpPercent > 0.5 ? '#00ffaa' : (hpPercent > 0.2 ? '#ffaa00' : '#ff0055'); 
                ctx.fillStyle = hpColor; 
                ctx.fillRect(cx - 39, cy - 69 + player.spriteOffsetY, 78 * hpPercent, 8); 
            }
            
            let currentImg = ASSETS[`player_${player.state}`]; 
            ctx.save(); 
            ctx.translate(cx, cy); 
            if (!player.facingRight) { 
                ctx.scale(-1, 1); 
            } 
            let flipDrawX = -64 + player.spriteOffsetX; 
            let flipDrawY = -64 + player.spriteOffsetY;
            
            if (currentImg && currentImg.complete && currentImg.naturalWidth > 0) { 
                let maxFrames = player.framesConfig[player.state] || 1;
                let spriteW = Math.floor(currentImg.naturalWidth / maxFrames); 
                let spriteH = currentImg.naturalHeight;
                let safeFrame = player.frameX % maxFrames;
                
                ctx.drawImage(
                    currentImg, 
                    Math.floor(safeFrame * spriteW), 0, 
                    spriteW, spriteH, 
                    flipDrawX, flipDrawY, 
                    128, 128
                ); 
            } else { 
                ctx.fillStyle = player.state.includes('shoot') ? '#ff9900' : '#0066ff'; 
                ctx.fillRect(-30 + player.spriteOffsetX, -40 + player.spriteOffsetY, 60, 80); 
                ctx.fillStyle = 'white'; 
                ctx.beginPath(); 
                ctx.arc(15 + player.spriteOffsetX, -15 + player.spriteOffsetY, 8, 0, Math.PI*2); 
                ctx.fill(); 
            } 
            ctx.restore();
        }
    }

    for (let i=0; i<walls.length; i++) {
        walls[i].drawHP(walls[i].x - player.x + cx, walls[i].y - player.y + cy);
    }

    let wasBreached = isWallBreached;
    for (let i = walls.length - 1; i >= 0; i--) { 
        if (walls[i].hp <= 0) {
            walls.splice(i, 1); 
            isWallBreached = true;
        } 
    }
    
    if (isWallBreached && !wasBreached && siegeStarted) {
        showCenterAlert("⚠️ 防线已被突破！异种涌入！", "#ff0000", 6000);
        for(let i=0; i<zombies.length; i++) {
            if (zombies[i].state === 'stay_attack') { 
                zombies[i].state = 'chase'; 
                zombies[i].frameX = 0; 
            }
        }
    }

    for (let i = zombies.length - 1; i >= 0; i--) { 
        let z = zombies[i]; 
        if (z.hp <= 0 && !z.isDeadCounted && z.state === 'dead_idle') { 
            kills++; 
            z.isDeadCounted = true; 
        }
        if (z.state === 'dead_idle' && Math.hypot(z.x - player.x, z.y - player.y) > 2000) { 
            zombies.splice(i, 1); 
        }
    }

    fctx.clearRect(0, 0, width, height); 
    fctx.globalCompositeOperation = 'source-over'; 
    fctx.fillStyle = 'rgba(0, 0, 0, 0.65)'; 
    fctx.fillRect(0, 0, width, height); 
    fctx.globalCompositeOperation = 'destination-out'; 
    fctx.fillStyle = 'rgba(0, 0, 0, 1)'; 
    
    let startCol = Math.floor((player.x - width/2) / FOG_TILE_SIZE) - 1; 
    let endCol = Math.ceil((player.x + width/2) / FOG_TILE_SIZE) + 1; 
    let startRow = Math.floor((player.y - height/2) / FOG_TILE_SIZE) - 1; 
    let endRow = Math.ceil((player.y + height/2) / FOG_TILE_SIZE) + 1;
    
    for (let c = startCol; c <= endCol; c++) { 
        for (let r = startRow; r <= endRow; r++) { 
            if (fogSet.has(`${c},${r}`)) { 
                let sX = c * FOG_TILE_SIZE - player.x + width/2 + FOG_TILE_SIZE/2; 
                let sY = r * FOG_TILE_SIZE - player.y + height/2 + FOG_TILE_SIZE/2; 
                fctx.beginPath(); 
                fctx.arc(sX, sY, FOG_TILE_SIZE * 0.8, 0, Math.PI * 2); 
                fctx.fill(); 
            } 
        } 
    }
    let grad = fctx.createRadialGradient(cx, cy, player.visionRadius * 0.6, cx, cy, player.visionRadius); 
    grad.addColorStop(0, 'rgba(0,0,0,1)'); 
    grad.addColorStop(1, 'rgba(0,0,0,0)'); 
    fctx.fillStyle = grad; 
    fctx.beginPath(); 
    fctx.arc(cx, cy, player.visionRadius, 0, Math.PI*2); 
    fctx.fill(); 
    ctx.drawImage(fogCanvas, 0, 0);

    for (let i = bullets.length - 1; i >= 0; i--) { 
        let b = bullets[i]; 
        if (b.life <= 0) { 
            bullets.splice(i, 1); 
            continue; 
        } 
        b.draw(b.x - player.x + cx, b.y - player.y + cy); 
    }
    
    for (let i = damageTexts.length - 1; i >= 0; i--) {
        let dtObj = damageTexts[i]; 
        dtObj.life -= dt; 
        if (dtObj.life <= 0) { 
            damageTexts.splice(i, 1); 
            continue; 
        }
        ctx.globalAlpha = Math.max(0, dtObj.life / dtObj.maxLife); 
        // 【自适应修复】
        ctx.font = 'bold 45px sans-serif'; 
        ctx.fillStyle = dtObj.fillColor; 
        let drawX = dtObj.x - player.x + cx; 
        let drawY = dtObj.y - player.y + cy - ((dtObj.maxLife - dtObj.life) / 2000) * 40; 
        if (dtObj.strokeColor) { 
            ctx.strokeStyle = dtObj.strokeColor; 
            ctx.lineWidth = 4; 
            ctx.strokeText(dtObj.text, drawX, drawY); 
        } 
        ctx.fillText(dtObj.text, drawX, drawY); 
        ctx.globalAlpha = 1.0;
    }

    if (gameState === 'playing') {
        activeTowerToRepair = null;
        let t1Active = (tutorialPhase === 'fix_tower1' && tower && tower.state === 'broken' && Math.hypot(player.x - tower.x, player.y - tower.y) < 250); 
        let t2Active = (tutorialPhase === 'build_tower2' && tower2 && tower2.state === 'broken' && Math.hypot(player.x - tower2.x, player.y - tower2.y) < 250); 
        let wallActive = (tutorialPhase === 'build_walls' && wallBuilder && wallBuilder.state === 'broken' && Math.hypot(player.x - wallBuilder.x, player.y - wallBuilder.y) < 250);
        
        let btnX = 0; 
        let btnY = 0; 
        let btnText = "";
        
        if (t1Active) { 
            activeTowerToRepair = tower; 
            btnX = tower.x; 
            btnY = tower.y; 
            btnText = "⚙️ 修复防御塔"; 
        } 
        else if (t2Active) { 
            activeTowerToRepair = tower2; 
            btnX = tower2.x; 
            btnY = tower2.y; 
            btnText = "⚙️ 部署新防线"; 
        }
        else if (wallActive) { 
            activeTowerToRepair = wallBuilder; 
            btnX = wallBuilder.x; 
            btnY = wallBuilder.y; 
            btnText = "🧱 部署要塞围墙"; 
        }

        if (activeTowerToRepair) {
            let screenBtnX = btnX - player.x + cx; 
            let screenBtnY = btnY - player.y + cy + 60; 
            let scale = 1 + Math.sin(time / 150) * 0.03;
            ctx.save(); 
            ctx.translate(screenBtnX, screenBtnY); 
            ctx.scale(scale, scale);
            let bw = 240, bh = 60; 
            ctx.fillStyle = '#ff6600'; 
            ctx.shadowColor = 'rgba(0,0,0,0.5)'; 
            ctx.shadowBlur = 10; 
            ctx.shadowOffsetY = 5;
            ctx.beginPath(); 
            ctx.roundRect(-bw/2, -bh/2, bw, bh, 15); 
            ctx.fill(); 
            ctx.strokeStyle = 'white'; 
            ctx.lineWidth = 4; 
            ctx.stroke();
            ctx.shadowBlur = 0; 
            ctx.fillStyle = 'white'; 
            // 【自适应修复】
            ctx.font = 'bold 40px sans-serif'; 
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle'; 
            ctx.fillText(btnText, 0, 0); 
            ctx.restore();
        }

        if (tutorialPhase === 'kill_2_zombies') { 
            let aliveZombies = [];
            for (let i=0; i<zombies.length; i++) {
                if (zombies[i].hp > 0) aliveZombies.push(zombies[i]);
            }
            if(aliveZombies.length > 0) { 
                let nearestZ = aliveZombies[0];
                for (let i=1; i<aliveZombies.length; i++) {
                    let d1 = Math.hypot(player.x - nearestZ.x, player.y - nearestZ.y);
                    let d2 = Math.hypot(player.x - aliveZombies[i].x, player.y - aliveZombies[i].y);
                    if (d2 < d1) nearestZ = aliveZombies[i];
                }
                drawArrowTo(nearestZ.x, nearestZ.y, `清理周边威胁 (${kills}/2)`, cx, cy, time); 
            } 
        } 
        else if (tutorialPhase === 'fix_tower1' && tower.state === 'broken') { 
            drawArrowTo(tower.x, tower.y, "前往修复防御塔！", cx, cy, time); 
        } 
        else if (tutorialPhase === 'gather') { 
            if (resources.length > 0) { 
                let nearest = resources[0];
                for (let i=1; i<resources.length; i++) {
                    let d1 = Math.hypot(player.x - nearest.x, player.y - nearest.y);
                    let d2 = Math.hypot(player.x - resources[i].x, player.y - resources[i].y);
                    if (d2 < d1) nearest = resources[i];
                }
                drawArrowTo(nearest.x, nearest.y, `探索收集建材 (${totalResourcesCollected}/4)`, cx, cy, time); 
            } else { 
                ctx.fillStyle = '#00ffcc'; 
                // 【自适应修复】
                ctx.font = 'bold 48px sans-serif'; 
                ctx.textAlign = 'center'; 
                ctx.fillText(`正在扫描建材... (${totalResourcesCollected}/4)`, cx, 150); 
                ctx.textAlign = 'left'; 
            } 
        } 
        else if (tutorialPhase === 'build_tower2' && tower2 && tower2.state === 'broken') { 
            drawArrowTo(tower2.x, tower2.y, "前往部署新防线！", cx, cy, time); 
        } 
        else if (tutorialPhase === 'gather_walls') { 
            if (resources.length > 0) { 
                let nearest = resources[0];
                for (let i=1; i<resources.length; i++) {
                    let d1 = Math.hypot(player.x - nearest.x, player.y - nearest.y);
                    let d2 = Math.hypot(player.x - resources[i].x, player.y - resources[i].y);
                    if (d2 < d1) nearest = resources[i];
                }
                drawArrowTo(nearest.x, nearest.y, `收集建材建墙 (${totalResourcesCollected}/7)`, cx, cy, time); 
            } 
        } 
        else if (tutorialPhase === 'build_walls' && wallBuilder && wallBuilder.state === 'broken') { 
            drawArrowTo(wallBuilder.x, wallBuilder.y, "前往塔旁部署围墙！", cx, cy, time); 
        }
    }

    if (joystick.active && player.hp > 0 && gameState === 'playing') {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; 
        ctx.beginPath(); 
        ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI*2); 
        ctx.fill();
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; 
        ctx.beginPath(); 
        ctx.arc(joystick.startX + joystick.vectorX * joystick.maxRadius, joystick.startY + joystick.vectorY * joystick.maxRadius, 40, 0, Math.PI*2); 
        ctx.fill();
    }

    if (gameState === 'tutorial') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; 
        ctx.fillRect(0, 0, width, height); 
        ctx.textAlign = 'center';
        
        ctx.fillStyle = '#ffff00'; 
        // 【自适应修复】
        ctx.font = 'bold 100px sans-serif'; 
        ctx.fillText("获得武器: 废土手枪", cx, cy - 200);
        
        let alpha = 0.5 + 0.5 * Math.sin(time / 200); 
        ctx.globalAlpha = alpha;
        
        ctx.fillStyle = '#00ffcc'; 
        // 【自适应修复】
        ctx.font = 'bold 70px sans-serif'; 
        ctx.fillText("👇 长按任意位置拖动走位 👇", cx, cy + 150);
        
        ctx.fillStyle = 'white'; 
        // 【自适应修复】
        ctx.font = 'bold 45px sans-serif'; 
        ctx.fillText("射程极短，走位清剿丧尸！", cx, cy + 230);
        
        ctx.globalAlpha = 1.0; 
        ctx.textAlign = 'left';
    }
    
    // 把控制权交还给防崩溃包装器
    requestAnimationFrame(safeGameLoop);
}

function resizeUI() { 
    const container = document.getElementById('game-container'); 
    const rect = container.getBoundingClientRect(); 
    document.documentElement.style.setProperty('--ui-scale', rect.width / 1080); 
}
window.addEventListener('resize', resizeUI); 
resizeUI();

let totalAssets = Object.keys(assetPaths).length; 
let loadedAssets = 0; 
let isGameStarted = false; 

function checkLoadComplete(key, img) {
    if (img && img.naturalWidth > 0 && (PART_TYPES[key] || key.includes('tower') || key.includes('wall'))) {
        let collider = calculatePixelPerfectCollider(img);
        if (collider.radius > 0) {
            if (PART_TYPES[key]) {
                PART_TYPES[key].colRadius = collider.radius;
                PART_TYPES[key].colOffsetY = collider.offsetY;
            } else {
                COLLIDER_CACHE[key] = collider;
            }
        }
    }

    loadedAssets++; 
    let progress = Math.floor((loadedAssets / totalAssets) * 100);
    
    let textEl = document.getElementById('loading-text'); 
    let barEl = document.getElementById('loading-progress');
    if (textEl) textEl.innerText = `资源加载中 ${progress}%`; 
    if (barEl) barEl.style.width = `${progress}%`;
    
    if (loadedAssets >= totalAssets && !isGameStarted) { 
        isGameStarted = true; 
        let loadingScreen = document.getElementById('loading-screen'); 
        if (loadingScreen) { 
            loadingScreen.style.opacity = '0'; 
            setTimeout(() => { 
                loadingScreen.style.display = 'none'; 
                initGame(); 
                requestAnimationFrame(safeGameLoop); 
            }, 800); 
        } 
    }
}

for (let key in assetPaths) { 
    ASSETS[key] = new Image(); 
    ASSETS[key].onload = () => checkLoadComplete(key, ASSETS[key]); 
    ASSETS[key].onerror = () => checkLoadComplete(key, ASSETS[key]); 
    ASSETS[key].src = assetPaths[key]; 
}

</script>
