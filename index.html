<!DOCTYPE html>

    <style>
        :root { --ui-scale: 1; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            touch-action: none; font-family: sans-serif; user-select: none; 
        }
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            max-width: calc(100vh * (1080 / 1920)); max-height: calc(100vw * (1920 / 1080)); 
            aspect-ratio: 1080 / 1920; background-color: #1a1a1a; overflow: hidden; 
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); font-size: calc(10px * var(--ui-scale)); 
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        #loading-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #0a0a0a; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s ease; 
        }
        #loading-text { 
            color: #00ffcc; font-size: 3.2em; font-weight: bold; margin-bottom: 2em; 
            text-shadow: 0 0 1.5em rgba(0, 255, 204, 0.5); letter-spacing: 0.2em; 
        }
        #loading-bar-container { 
            width: 70%; height: 2.4em; background: #222; border: 0.3em solid #444; 
            border-radius: 1.2em; overflow: hidden; box-shadow: inset 0 0 1em #000; 
        }
        #loading-progress { 
            width: 0%; height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); 
            transition: width 0.1s ease; box-shadow: 0 0 2em rgba(0, 255, 170, 0.6); 
        }

        #center-alert { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            color: #ff0055; font-size: 3.2em; font-weight: bold; 
            text-shadow: 0.2em 0.2em 0.5em black, 0 0 2em #ff0055; 
            pointer-events: none; z-index: 50; opacity: 0; transition: opacity 0.5s; 
            text-align: center; width: 90%; line-height: 1.4; 
        }

        /* ============== 完美优化的剧情对话框 ============== */
        #dialog-overlay {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.65); /* 全屏变暗 */
            z-index: 2000; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s;
            display: flex;
            justify-content: center;

        #dialog-box {
            position: absolute;
            bottom: 25%; /* 整体往上移，防止挡住摇杆 */
            width: 90%;

        }
        #dialog-bg-img {

            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: fill; 
            z-index: 1;
            background: rgba(20, 20, 20, 0.9); 
            border: 0.2em solid #555; 
            border-radius: 1.5em;

        #dialog-avatar-img {
            position: absolute;

            left: -1em;

            height: 22em; /* 立绘突破上边框形成立体感 */

        #dialog-text {
            position: absolute; 
            top: 2em; 
            left: 8em; /* 留出左边立绘空间 (基于内部字体2em，8em等于主级的16em) */
            right: 1em; 
            bottom: 2em; 
            z-index: 3;
            color: white; 
            font-size: 2em; /* 字体大小精准设为20 */
            text-align: left; 
            white-space: normal; /* 开启自动换行 */

        }
        #dialog-tip {

            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.2; } }
        /* ============================================== */

        #hud-top { 
            position: absolute; top: 2em; left: 2em; right: 2em;

        #player-profile {

            display: none; padding: 2em; box-sizing: border-box;
            font-family: monospace; font-size: 1.5em;
        }
    </style>

/** ==========================================
 * 像素探测引擎 (阈值 150)
 * ========================================== */
function calculatePixelPerfectCollider(img) {
    if (!img || img.naturalWidth === 0 || img.naturalHeight === 0) {
        return { radius: 0, offsetY: 0 };
    }

    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = img.naturalWidth;
    tempCanvas.height = img.naturalHeight;
    const tCtx = tempCanvas.getContext('2d');
    
    try {
        tCtx.drawImage(img, 0, 0);
        const imageData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imageData.data;
        
        let minX = tempCanvas.width;
        let maxX = 0;
        let minY = tempCanvas.height;
        let maxY = 0;
        let foundPixels = false;

        for (let y = 0; y < tempCanvas.height; y++) {
            for (let x = 0; x < tempCanvas.width; x++) {
                const alpha = data[(y * tempCanvas.width + x) * 4 + 3];
                // 严格剔除阴影
                if (alpha > 150) { 
                    foundPixels = true;
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
        }

        if (!foundPixels) {
            return { radius: 0, offsetY: 0 };
        }

        const contentWidth = maxX - minX;
        const contentHeight = maxY - minY;
        const actualRadius = Math.min(contentWidth, contentHeight) / 2 * 0.8;
        const imgBottomY = tempCanvas.height;
        const contentCenterY = minY + contentHeight / 2;
        const offsetY = contentCenterY - imgBottomY + (contentHeight * 0.3);

        return { radius: actualRadius, offsetY: offsetY };
    } catch (e) {
        return { radius: 0, offsetY: 0 };
    }
}

function resolvePhysics(entity) {
    // 碰撞半径放大至 0.65 避免穿模
    let entityRadius = entity.colRadius || (entity.size ? entity.size * 0.65 : 30); 
    let isBlocked = false; 
    let hitColliders = [];
    
    let colliders = [];
    for (let i=0; i<sceneParts.length; i++) colliders.push(sceneParts[i]);
    for (let i=0; i<walls.length; i++) colliders.push(walls[i]);

    if (tower) {
        colliders.push({ 
            x: tower.x, 
            y: tower.y + tower.colOffsetY, 
            colRadius: tower.colRadius, 
            isBuilding: true 
        }); 
    }
    if (tower2) {
        colliders.push({ 
            x: tower2.x, 
            y: tower2.y + tower2.colOffsetY, 
            colRadius: tower2.colRadius, 
            isBuilding: true 
        });
    }
    
    if (gate) {
        let dist = gate.distToSegment(entity.x, entity.y);
        if (dist < entityRadius + gate.thickness / 2) {
            let dx = gate.x2 - gate.x1; 
            let dy = gate.y2 - gate.y1; 
            let len = Math.hypot(dx, dy);
            let nx = -dy / len; 
            let ny = dx / len; 
            let dot = (entity.x - gate.x1) * nx + (entity.y - gate.y1) * ny;
            
            let t = ((entity.x - gate.x1) * dx + (entity.y - gate.y1) * dy) / (len * len);
            let gapSize = 0.4 * gate.openProgress; 
            let isInGap = (t > 0.5 - gapSize/2 && t < 0.5 + gapSize/2);
            
            if (!isInGap) {
                let pushForce = entity.speed ? entity.speed + 1 : 6;
                if (dot > 0) { 
                    entity.x += nx * pushForce; 
                    entity.y += ny * pushForce; 
                } else { 
                    entity.x -= nx * pushForce; 
                    entity.y -= ny * pushForce; 
                }
                isBlocked = true; 
                hitColliders.push(gate);
            }
        }
    }

    for (let i = 0; i < colliders.length; i++) {
        let c = colliders[i];
        let r = c.colRadius !== undefined ? c.colRadius : c.radius; 
        if (!r || r === 0) continue; 
        
        let cy = c.colOffsetY !== undefined ? c.y + c.colOffsetY : c.y; 
        let cx = c.x;

        let dx = entity.x - cx; 
        let dy = entity.y - cy;
        let dist = Math.hypot(dx, dy); 
        let minDist = entityRadius + r;
        
        if (dist > 0 && dist < minDist) {
            let overlap = minDist - dist;
            entity.x += (dx / dist) * overlap; 
            entity.y += (dy / dist) * overlap;
            isBlocked = true; 
            hitColliders.push(c);
        }
    }
    
    return { blocked: isBlocked, hit: hitColliders };
}

class WallBuilder {
    constructor(x, y) {
        this.x = x; 
        this.y = y; 
        this.state = 'broken';
        this.repairTimer = 0; 
        this.repairTimeMax = 2000; 
        this.showEffect = false; 
        this.effectRadius = 0;
    }
    update(dt, time) {
        if (this.state === 'repairing') {
            this.repairTimer += dt;
            if (this.repairTimer >= this.repairTimeMax) {
                this.state = 'active'; 
                this.showEffect = true; 
                this.effectRadius = 0;
                addDamageText(this.x, this.y - 150, `✨ 要塞部署完毕 ✨`, '#00ffcc', '#000000');
                
                tutorialPhase = 'done';
                let cfg = GameConfig.walls;
                let dx = tower2.x - tower.x; 
                let dy = tower2.y - tower.y; 
                let len = Math.hypot(dx, dy); 
                let ux = dx / len; 
                let uy = dy / len; 
                let vx = -uy; 
                let vy = ux; 

                let pA = { x: tower.x - ux * 3 * cfg.segmentLen, y: tower.y - uy * 3 * cfg.segmentLen };
                for(let i=1; i<=3; i++) { 
                    walls.push(new WallSegment(tower.x - ux * i * cfg.segmentLen, tower.y - uy * i * cfg.segmentLen, false)); 
                }

                let pB = { x: tower2.x + ux * 3 * cfg.segmentLen, y: tower2.y + uy * 3 * cfg.segmentLen };
                for(let i=1; i<=3; i++) { 
                    walls.push(new WallSegment(tower2.x + ux * i * cfg.segmentLen, tower2.y + uy * i * cfg.segmentLen, false)); 
                }

                walls.push(new WallSegment(tower.x - ux * 0.6 * cfg.segmentLen, tower.y - uy * 0.6 * cfg.segmentLen, false)); 
                walls.push(new WallSegment(tower2.x + ux * 0.6 * cfg.segmentLen, tower2.y + uy * 0.6 * cfg.segmentLen, false));

                let w2StartX = pA.x + cfg.wall2StartOffset.x; 
                let w2StartY = pA.y + cfg.wall2StartOffset.y; 
                let pD = { x: 0, y: 0 };
                for(let i=0; i<8; i++) {
                    let curX = w2StartX + i * (vx * cfg.segmentLen + cfg.stepOffset.x); 
                    let curY = w2StartY + i * (vy * cfg.segmentLen + cfg.stepOffset.y);
                    walls.push(new WallSegment(curX, curY, true)); 
                    if (i === 7) {
                        pD = { x: curX, y: curY }; 
                    }
                }

                let w3StartX = pB.x + cfg.wall3StartOffset.x; 
                let w3StartY = pB.y + cfg.wall3StartOffset.y; 
                let pC = { x: 0, y: 0 };
                for(let i=0; i<8; i++) {
                    let curX = w3StartX + i * (vx * cfg.segmentLen + cfg.stepOffset.x); 
                    let curY = w3StartY + i * (vy * cfg.segmentLen + cfg.stepOffset.y);
                    walls.push(new WallSegment(curX, curY, true)); 
                    if (i === 7) {
                        pC = { x: curX, y: curY }; 
                    }
                }

                let bottomLen = Math.hypot(pC.x - pD.x, pC.y - pD.y); 
                let bottomCount = Math.floor(bottomLen / cfg.segmentLen);
                let bux = (pC.x - pD.x) / bottomLen; 
                let buy = (pC.y - pD.y) / bottomLen;
                
                for(let i=1; i<=bottomCount; i++) { 
                    walls.push(new WallSegment(pD.x + bux * i * cfg.segmentLen, pD.y + buy * i * cfg.segmentLen, false)); 
                }

                siegeStarted = true; 
                siegeStartTime = performance.now(); 
                showCenterAlert("🚨 丧尸围城！突击队正从四周逼近！死守防线！", "#ff0000", 8000);
                
                for(let i=0; i<100; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let dist = 1200 + Math.random() * 400;
                    zombies.push(new Zombie(tower.x + Math.cos(angle)*dist, tower.y + Math.sin(angle)*dist, 'siege'));
                }
            }
        }
    }
    
    draw(screenX, screenY) {
        if (this.showEffect) {
            this.effectRadius += 30; 
            let effectAlpha = Math.max(0, 1 - this.effectRadius / 1000);
            ctx.strokeStyle = `rgba(0, 255, 200, ${effectAlpha})`; 
            ctx.lineWidth = 20;
            ctx.beginPath(); 
            ctx.arc(screenX, screenY, this.effectRadius, 0, Math.PI*2); 
            ctx.stroke();
            if (this.effectRadius > 1000) {
                this.showEffect = false;
            }
        }

        if (this.state === 'repairing') {
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; 
            ctx.fillRect(screenX - 80, screenY + 60, 160, 15);
            
            ctx.fillStyle = '#00ffcc'; 
            ctx.fillRect(screenX - 80, screenY + 60, 160 * (this.repairTimer / this.repairTimeMax), 15);
            
            ctx.fillStyle = 'white'; 
            // 【自适应修复】：使用绝对 px 单位，匹配 1080x1920 的自适应缩放机制
            ctx.font = 'bold 24px sans-serif'; 
            ctx.textAlign='center'; 
            ctx.fillText("建造中...", screenX, screenY + 100); 
            ctx.textAlign='left';
        }
    }
}

class ScenePart {
    constructor(type, x, y) {
        this.type = type; 
        this.x = x; 
        this.y = y;
        this.config = PART_TYPES[type];
        this.scale = 2.0;
        this.colRadius = this.config.colRadius * this.scale;
        this.colOffsetY = this.config.colOffsetY * this.scale;
    }
    draw(screenX, screenY) {
        let gridX = Math.floor(this.x / FOG_TILE_SIZE); 
        let gridY = Math.floor(this.y / FOG_TILE_SIZE);
        if (!fogSet.has(`${gridX},${gridY}`) && gameState !== 'intro') {
            return;
        }

        let img = ASSETS[this.type];
        ctx.save();
        if (img && img.complete && img.naturalWidth > 0) {
            let nw = img.naturalWidth * this.scale; 
            let nh = img.naturalHeight * this.scale;
            ctx.drawImage(img, screenX - nw/2, screenY - nh, nw, nh);
        } else {
            let fallbackSize = this.colRadius > 0 ? this.colRadius * 2 : 40 * this.scale;
            ctx.fillStyle = this.type.includes('tree') ? '#2e8b57' : (this.type.includes('stone') ? '#778899' : (this.type.includes('house') ? '#8b4513' : '#556b2f'));
            ctx.beginPath(); 
            ctx.ellipse(screenX, screenY - fallbackSize/2, fallbackSize/2, fallbackSize/2, 0, 0, Math.PI*2); 
            ctx.fill();
        }
        ctx.restore();
    }
}

class Resource {

    }

            ctx.lineWidth = 4;

class WallSegment {
    constructor(x, y, flipX) {
        this.x = x; 
        this.y = y; 
        this.flipX = flipX; 
        this.scale = 1.8; 
        this.imgType = Math.random() > 0.5 ? 1 : 2; 
        this.hp = 300; 
        this.maxHp = 300;
        this.state = 'idle'; 
        this.frameX = 0; 
        this.frameTimer = 0; 
        this.frameInterval = 100;
        this.isBuilding = true;
        
        let imgKey = `wall${this.imgType}_idle`;
        let img = ASSETS[imgKey];
        let renderScale = (img && img.naturalHeight > 0) ? (128 / img.naturalHeight) * this.scale : this.scale;
        let collider = COLLIDER_CACHE[imgKey];
        
        // 1.35 防漏风膨胀系数
        let wallSealMultiplier = 1.35; 
        this.colRadius = collider ? (collider.radius * renderScale * wallSealMultiplier) : 32 * this.scale * wallSealMultiplier;
        this.colOffsetY = 50 * this.scale + (collider ? collider.offsetY * renderScale : -10 * this.scale);
        this.radius = this.colRadius; 
    }
    
    update(dt) {
        if (this.state === 'hit') {
            this.frameTimer += dt;
            if (this.frameTimer > this.frameInterval) {
                this.frameX++;
                this.frameTimer = 0;
                if (this.frameX >= 2) { 
                    this.state = 'idle';
                    this.frameX = 0;
                }
            }
        }
    } 
    
    draw(screenX, screenY) {
        let gridX = Math.floor(this.x / FOG_TILE_SIZE); 
        let gridY = Math.floor(this.y / FOG_TILE_SIZE);
        if (!fogSet.has(`${gridX},${gridY}`) && gameState !== 'intro') {
            return;
        }

        let imgKey = `wall${this.imgType}_${this.state}`;
        let img = ASSETS[imgKey];
        let downOffset = 22; 

        ctx.save(); 
        ctx.translate(screenX, screenY); 
        if (this.flipX) {
            ctx.scale(-1, 1); 
        }
        ctx.scale(this.scale, this.scale); 

        if (img && img.complete && img.naturalWidth > 0) { 
            let frameCount = this.state === 'hit' ? 2 : 1;
            let spriteW = Math.floor(img.naturalWidth / frameCount);
            let safeFrame = this.frameX % frameCount; 
            
            ctx.drawImage(
                img, 
                Math.floor(safeFrame * spriteW), 0, 
                spriteW, img.naturalHeight, 
                -64, -100 + downOffset, 
                128, 128
            );
        } else {
            ctx.fillStyle = this.state === 'hit' ? '#cc3333' : '#555'; 
            ctx.fillRect(-32, -64 + downOffset, 64, 64); 
            ctx.strokeStyle = '#222'; 
            ctx.lineWidth = 3; 
            ctx.strokeRect(-32, -64 + downOffset, 64, 64);
            ctx.fillStyle = '#666'; 
            ctx.fillRect(-32, -64 + downOffset, 64, 8); 
        }
        ctx.restore();
    }
    
    drawHP(screenX, screenY) {
        let gridX = Math.floor(this.x / FOG_TILE_SIZE); 
        let gridY = Math.floor(this.y / FOG_TILE_SIZE);
        if (!fogSet.has(`${gridX},${gridY}`) && gameState !== 'intro') return;

        let hpY = -120 - 40; 
        ctx.save(); 
        ctx.translate(screenX, screenY);
        if (this.hp < this.maxHp) {
            ctx.fillStyle = '#000'; 
            ctx.fillRect(-32, hpY - 2, 64, 10); 
            ctx.fillStyle = '#ff0000'; 
            ctx.fillRect(-31, hpY - 1, 62, 8); 
            ctx.fillStyle = '#00ffaa'; 
            ctx.fillRect(-31, hpY - 1, 62 * Math.max(0, this.hp / this.maxHp), 8); 
        }
        ctx.restore();
    }
}

class Gate {
    constructor(x1, y1, x2, y2) {
        this.x1 = x1; 
        this.y1 = y1; 
        this.x2 = x2; 
        this.y2 = y2;
        this.openProgress = 0; 
        this.thickness = 40;
        this.locked = false; 
        this.isBuilding = true;
    }
    update(dt) {
        let distToPlayer = this.distToSegment(player.x, player.y);
        let dx = this.x2 - this.x1; 
        let dy = this.y2 - this.y1; 
        let len = Math.hypot(dx, dy);
        let nx = -dy / len; 
        let ny = dx / len; 
        let dot = (player.x - this.x1) * nx + (player.y - this.y1) * ny;

        if (isWallBreached) {
            this.locked = false;
        } else if (siegeStarted && !this.locked) {
            if (dot > 80 && distToPlayer > 80) {
                this.locked = true;
                showCenterAlert("🔒 要塞大门已锁死！准备迎战！", "#ffcc00", 3000);
            }
        }

        if (!this.locked && distToPlayer < 250) { 
            this.openProgress = Math.min(1, this.openProgress + dt / 300); 
        } else { 
            this.openProgress = Math.max(0, this.openProgress - dt / 300); 
        }

        if (siegeStarted && this.locked) {
            let hasActiveZombies = false;
            for(let i=0; i<zombies.length; i++) {
                if (zombies[i].hp > 0 && (zombies[i].type === 'siege' || zombies[i].type === 'boss')) {
                    hasActiveZombies = true;
                    break;
                }
            }
            if (!hasActiveZombies && bossSpawnedInSiege) {
                this.locked = false;
            }
        }
    }
    distToSegment(px, py) {
        let l2 = Math.pow(this.x2 - this.x1, 2) + Math.pow(this.y2 - this.y1, 2);
        if (l2 === 0) {
            return Math.hypot(px - this.x1, py - this.y1);
        }
        let t = Math.max(0, Math.min(1, ((px - this.x1) * (this.x2 - this.x1) + (py - this.y1) * (this.y2 - this.y1)) / l2));
        let projX = this.x1 + t * (this.x2 - this.x1); 
        let projY = this.y1 + t * (this.y2 - this.y1);
        return Math.hypot(px - projX, py - projY);
    }
    draw(screenXOffset, screenYOffset) {
        let midWorldX = (this.x1 + this.x2)/2; 
        let midWorldY = (this.y1 + this.y2)/2;
        let gridX = Math.floor(midWorldX / FOG_TILE_SIZE); 
        let gridY = Math.floor(midWorldY / FOG_TILE_SIZE);
        if (!fogSet.has(`${gridX},${gridY}`)) return;

        let sx1 = this.x1 - player.x + width/2; 
        let sy1 = this.y1 - player.y + height/2;
        let sx2 = this.x2 - player.x + width/2; 
        let sy2 = this.y2 - player.y + height/2;
        let midX = (sx1 + sx2) / 2; 
        let midY = (sy1 + sy2) / 2;

        ctx.save(); 
        ctx.strokeStyle = '#222'; 
        ctx.lineWidth = this.thickness; 
        ctx.lineCap = 'butt';
        
        let fullDist = Math.hypot(sx2-sx1, sy2-sy1);
        let gapWidth = (fullDist / 2 - 20) * this.openProgress; 
        let angle = Math.atan2(sy2 - sy1, sx2 - sx1);
        let dx = Math.cos(angle); 
        let dy = Math.sin(angle);
        
        let d1EndX = midX - dx * gapWidth; 
        let d1EndY = midY - dy * gapWidth;
        let d2StartX = midX + dx * gapWidth; 
        let d2StartY = midY + dy * gapWidth;

        ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(d1EndX, d1EndY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx2, sy2); ctx.lineTo(d2StartX, d2StartY); ctx.stroke();
        
        ctx.strokeStyle = this.locked ? '#ff0000' : '#00ffcc'; 
        ctx.lineWidth = 15; 
        ctx.shadowColor = this.locked ? '#ff0000' : '#00ffcc'; 
        ctx.shadowBlur = 20;
        
        if(this.openProgress > 0.1 && !this.locked) { 
            ctx.strokeStyle = '#ffcc00'; 
            ctx.shadowColor = '#ffcc00'; 
        } 
        
        ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(d1EndX, d1EndY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx2, sy2); ctx.lineTo(d2StartX, d2StartY); ctx.stroke();
        ctx.restore();
    }
}

class Tower {
    constructor(x, y, label) {
        this.x = x; 
        this.y = y; 
        this.state = 'broken'; 
        this.label = label || "防御塔";
        this.repairTimer = 0; 
        this.repairTimeMax = 2000; 
        this.attackRadius = 500; 
        this.lastShotTime = 0; 
        this.shotInterval = 800; 
        this.imgWidth = 256; 
        this.imgHeight = 512;
        this.showEffect = false; 
        this.effectRadius = 0;
        
        let img = ASSETS['tower_active'];
        let renderScale = (img && img.naturalWidth > 0) ? (this.imgWidth / img.naturalWidth) : 1;
        let collider = COLLIDER_CACHE['tower_active'];
        
        this.colRadius = collider ? collider.radius * renderScale : 60;
        this.colOffsetY = 120 + (collider ? collider.offsetY * renderScale : -20);
        this.radius = this.colRadius;
    }
    
    update(dt, time) {
        if (this.state === 'repairing') {
            this.repairTimer += dt;
            if (this.repairTimer >= this.repairTimeMax) { 
                this.state = 'active'; 
                this.showEffect = true; 
                this.effectRadius = 0;
                addDamageText(this.x, this.y - 300, `✨ ${this.label} 已部署 ✨`, '#00ffcc', '#000000');
            }
        } else if (this.state === 'active') {
            if (time - this.lastShotTime > this.shotInterval) {
                let closestDist = Infinity; 
                let targetZombie = null;
                for (let i=0; i<zombies.length; i++) {
                    let z = zombies[i];
                    if (z.hp <= 0 || z.state === 'dead_idle') continue;
                    let d = Math.hypot(z.x - this.x, z.y - this.y);
                    if (d < this.attackRadius && d < closestDist) { 
                        closestDist = d; 
                        targetZombie = z; 
                    }
                }
                if (targetZombie) { 
                    bullets.push(new Bullet(this.x, this.y - 200, targetZombie)); 
                    this.lastShotTime = time; 
                }
            }
        }
    }
    
    draw(screenX, screenY) {
        let tGridX = Math.floor(this.x / FOG_TILE_SIZE); 
        let tGridY = Math.floor(this.y / FOG_TILE_SIZE);
        if (!fogSet.has(`${tGridX},${tGridY}`) && gameState !== 'intro') return;

        let isPlayerBehind = (player.y < this.y + 50 && player.y > this.y - 450 && Math.abs(player.x - this.x) < 150);
        ctx.globalAlpha = isPlayerBehind ? 0.4 : 1.0;

        let img = this.state === 'active' ? ASSETS.tower_active : ASSETS.tower_broken;
        let drawX = screenX - this.imgWidth / 2; 
        let drawY = screenY - this.imgHeight + 120;

        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, drawX, drawY, this.imgWidth, this.imgHeight);
            if (this.state === 'broken') {
                ctx.globalCompositeOperation = 'screen'; 
                ctx.globalAlpha = 0.3 + Math.sin(Date.now()/200)*0.2;
                ctx.drawImage(img, drawX, drawY, this.imgWidth, this.imgHeight);
                ctx.globalCompositeOperation = 'source-over'; 
                ctx.globalAlpha = 1.0;
            }
        } else {
            ctx.fillStyle = this.state === 'active' ? '#00ccff' : '#555555'; 
            ctx.fillRect(drawX, drawY, this.imgWidth, this.imgHeight);
            if (this.state === 'active') {
                ctx.fillStyle = '#ffffff'; 
                ctx.beginPath(); 
                ctx.arc(screenX, screenY - 200, 30, 0, Math.PI*2); 
                ctx.fill();
                ctx.shadowColor = '#00ccff'; 
                ctx.shadowBlur = 40; 
                ctx.fill(); 
                ctx.shadowBlur = 0;
            }
        }
        ctx.globalAlpha = 1.0; 

        if (this.showEffect) {
            this.effectRadius += 25; 
            let effectAlpha = Math.max(0, 1 - this.effectRadius / 800);
            ctx.strokeStyle = `rgba(0, 255, 200, ${effectAlpha})`; 
            ctx.lineWidth = 15;
            ctx.beginPath(); 
            ctx.arc(screenX, screenY, this.effectRadius, 0, Math.PI*2); 
            ctx.stroke();
            
            ctx.fillStyle = `rgba(255, 255, 255, ${effectAlpha})`; 
            ctx.beginPath(); 
            ctx.arc(screenX, screenY - 200, this.effectRadius/4, 0, Math.PI*2); 
            ctx.fill();
            
            if (this.effectRadius > 800) {
                this.showEffect = false;
            }
        }

        if (this.state === 'repairing') {
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; 
            ctx.fillRect(screenX - 80, screenY + 60, 160, 15);
            ctx.fillStyle = '#00ffcc'; 
            ctx.fillRect(screenX - 80, screenY + 60, 160 * (this.repairTimer/this.repairTimeMax), 15);
            ctx.fillStyle = 'white'; 
            // 【自适应修复】：纯 px 保证完美渲染比例
            ctx.font = 'bold 24px sans-serif'; 
            ctx.textAlign='center'; 
            ctx.fillText("部署中...", screenX, screenY + 100); 
            ctx.textAlign='left';
        }
    }
}

class NPC {
    constructor(x, y, isMale) {
        this.x = x; 
        this.y = y; 
        this.hp = 10; 
        this.speed = 1.5; 
        this.color = isMale ? '#ffaa00' : '#00ddff'; 
        this.size = 40;
        this.state = 'run'; 
        this.frameX = 0; 
        this.frameTimer = 0; 
        this.frameInterval = 120; 
        this.framesConfig = { 'run': 4, 'fall': 4 };
    }
    update(dt) {
        if (this.state === 'dead') return; 
        if (this.hp <= 0 && this.state === 'run') { 
            this.state = 'fall'; 
            this.frameX = 0; 
            this.frameTimer = 0; 
        }
        if (this.state === 'run') { 
            this.y += this.speed; 
        }
        
        this.frameTimer += dt;
        if (this.frameTimer > this.frameInterval) {
            if (this.state === 'fall') { 
                if (this.frameX < this.framesConfig['fall'] - 1) { 
                    this.frameX++; 
                } else { 
                    this.state = 'dead'; 
                }
            } else { 
                this.frameX = (this.frameX + 1) % this.framesConfig['run']; 
            }
            this.frameTimer = 0; 
        }
    }
    draw(screenX, screenY) {
        let gridX = Math.floor(this.x / FOG_TILE_SIZE); 
        let gridY = Math.floor(this.y / FOG_TILE_SIZE);
        if (!fogSet.has(`${gridX},${gridY}`) && gameState !== 'intro') return;

        if (this.state === 'dead') {
            let img = ASSETS.npc_dead;
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.save(); 
                ctx.translate(screenX, screenY); 
                ctx.drawImage(img, -64, -64, 128, 128); 
                ctx.restore();
            } else { 
                ctx.fillStyle = '#444444'; 
                ctx.beginPath(); 
                ctx.arc(screenX, screenY, this.size, 0, Math.PI*2); 
                ctx.fill(); 
            }
        } else {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.beginPath(); 
            ctx.ellipse(screenX, screenY + 45, 30, 15, 0, 0, Math.PI*2); 
            ctx.fill();
            
            let img = this.state === 'run' ? ASSETS.npc_run : ASSETS.npc_fall;
            if (img && img.complete && img.naturalWidth > 0) {
                let maxFrames = this.framesConfig[this.state] || 1;
                let spriteW = Math.floor(img.naturalWidth / maxFrames);
                let spriteH = img.naturalHeight;
                let safeFrame = this.frameX % maxFrames;
                
                ctx.save(); 
                ctx.translate(screenX, screenY); 
                ctx.drawImage(
                    img, 
                    Math.floor(safeFrame * spriteW), 0, 
                    spriteW, spriteH, 
                    -64, -64, 
                    128, 128
                ); 
                ctx.restore();
            } else { 
                ctx.fillStyle = this.state === 'run' ? this.color : 'red'; 
                ctx.beginPath(); 
                ctx.arc(screenX, screenY, this.size, 0, Math.PI*2); 
                ctx.fill(); 
            }
        }
        if (this.state === 'run') { 
            ctx.fillStyle = 'white'; 
            ctx.font = 'bold 30px sans-serif'; // 【自适应修复】
            ctx.fillText("救命!", screenX - 25, screenY - 50); 
        }
    }
}

class Zombie {

        this.x = x;

        this.type = type; 
        this.hp = (type==='siege' ? 30 : (type==='boss' ? 300 : 10));

        this.evadeVec = {x: 0, y: 0};
        
        this.baseSpeed = (type==='boss' ? 1.0 : 2.0); 
        this.chaseSpeed = (type==='boss' ? 2.0 : 3.5); 
        this.size = (type==='boss' ? 120 : 50);
        
        this.minDmg = (type==='boss' ? 10 : 5); 
        this.maxDmg = (type==='boss' ? 20 : 8); 
        this.attackInterval = (type==='siege' ? 1000 : (type==='boss' ? 1500 : 1000));
    }

    update(dt, time, targets) {
        if (this.state === 'dead_idle') return;

        if (this.hp <= 0) {
            if (this.type === 'siege' || this.type === 'normal1') {
                if (this.state !== 'death') { 
                    this.state = 'death'; 
                    this.frameX = 0; 
                    this.frameTimer = 0; 
                }
            } else { 
                this.state = 'dead_idle'; 
                return; 
            }
        }

        this.frameTimer += dt;
        let drawState = (this.state === 'chase' || this.state === 'wander' || this.state === 'evade') ? 'run' : this.state;
        let frameLimits = { 'idle': 1, 'run': 5, 'move_attack': 8, 'stay_attack': 6, 'death': 7, 'dead_idle': 1 };
        let currentLimit = frameLimits[drawState] || 1;

        if (this.frameTimer > this.frameInterval) {
            this.frameX++;
            if (this.frameX >= currentLimit) {
                if (this.state === 'death') { 
                    this.state = 'dead_idle'; 
                    this.frameX = 0; 
                    return; 
                } 
                else if (this.state.includes('attack')) { 
                    this.state = 'chase'; 
                    this.frameX = 0; 
                } 
                else { 
                    this.frameX = 0; 
                }
            }
            this.frameTimer = 0;
        }

        if (this.state === 'death' || this.state.includes('attack')) return;

        let targetX = player.x; 
        let targetY = player.y; 
        let targetEntity = player; 
        let isTargetingWall = false;

        if (this.type === 'siege' && !isWallBreached) {
            if (!this.targetWall || this.targetWall.hp <= 0) {
                if (walls.length > 0) {
                    this.targetWall = walls[Math.floor(Math.random() * walls.length)];
                } else {
                    this.targetWall = null;
                }
            }
            if (this.targetWall) { 
                targetX = this.targetWall.x; 
                targetY = this.targetWall.y; 
                isTargetingWall = true; 
            }
        }

        if (!isTargetingWall) {
            let target = null; 
            let minDist = Infinity;
            for (let i=0; i<targets.length; i++) {
                let t = targets[i];
                if (t.hp <= 0) continue;
                let d = Math.hypot(t.x - this.x, t.y - this.y);
                if (d < minDist) { 
                    minDist = d; 
                    target = t; 
                }
            }
            if (!target) return; 
            targetX = target.x; 
            targetY = target.y; 
            targetEntity = target;
        }

        let distToTarget = Math.hypot(targetX - this.x, targetY - this.y);
        
        if (!isTargetingWall && distToTarget > 3000 && this.type !== 'boss' && this.type !== 'siege' && gameState === 'playing') { 
            this.hp = 0; 
            return; 
        }
        
        if (this.state !== 'evade') {
            if (distToTarget < this.aggroRadius || isTargetingWall) { 
                this.state = 'chase'; 
            } else if (this.state === 'chase') { 
                this.state = 'idle'; 
            }
        }

        if (this.state === 'chase' || this.state === 'wander' || this.state === 'evade') { 
            this.facingRight = (targetX > this.x); 
        }

        this.stateTimer -= dt;
        if (this.stateTimer <= 0 && this.state !== 'chase' && this.state !== 'evade') {
            if (Math.random() < 0.7) { 
                this.state = 'idle'; 
                this.stateTimer = 2000 + Math.random() * 2000; 
            } else { 
                this.state = 'wander'; 
                this.stateTimer = 1000 + Math.random() * 1500; 
                let angle = Math.random() * Math.PI * 2; 
                this.wanderVec = { x: Math.cos(angle), y: Math.sin(angle) }; 
            }
        }

        let intendedVx = 0; 
        let intendedVy = 0;
        
        if (this.state === 'evade') {
            intendedVx = this.evadeVec.x * this.chaseSpeed * 0.8; 
            intendedVy = this.evadeVec.y * this.chaseSpeed * 0.8;
            this.evadeTimer -= dt; 
            if (this.evadeTimer <= 0) {
                this.state = 'chase'; 
            }
        }
        else if (this.state === 'chase' && distToTarget > 0) { 
            intendedVx = ((targetX - this.x) / distToTarget) * this.chaseSpeed; 
            intendedVy = ((targetY - this.y) / distToTarget) * this.chaseSpeed; 
        } 
        else if (this.state === 'wander') { 
            intendedVx = this.wanderVec.x * this.baseSpeed; 
            intendedVy = this.wanderVec.y * this.baseSpeed; 
        }

        let originalX = this.x; 
        let originalY = this.y;
        this.x += intendedVx; 
        this.y += intendedVy;
        
        let physResult = resolvePhysics(this); 
        
        if (physResult.blocked && this.state === 'chase') {
            let hitBuilding = null;
            for(let i=0; i<physResult.hit.length; i++) {
                if (physResult.hit[i] instanceof WallSegment || physResult.hit[i].isBuilding) {
                    hitBuilding = physResult.hit[i];
                    break;
                }
            }
            
            if (hitBuilding) {
                if (time - this.lastAttackTime > this.attackInterval) {
                    this.state = 'stay_attack'; 
                    this.frameX = 0; 
                    this.frameTimer = 0;
                    if (hitBuilding.hp !== undefined) {
                        hitBuilding.hp -= 3; 
                        if(hitBuilding.state !== undefined) { 
                            hitBuilding.state = 'hit'; 
                            hitBuilding.frameX = 0; 
                            hitBuilding.frameTimer = 0; 
                        }
                    }
                    this.lastAttackTime = time; 
                    addDamageText(hitBuilding.x || this.x, (hitBuilding.y || this.y) - 60, "-3", '#ff0000', '#ffffff');
                }
            } else {
                if (physResult.hit.length > 0) {
                    let blocker = physResult.hit[0];
                    if (blocker && blocker.x !== undefined && blocker.y !== undefined) {
                        let nx = this.x - blocker.x; 
                        let ny = this.y - blocker.y; 
                        let nLen = Math.hypot(nx, ny);
                        if (nLen > 0) {
                            nx /= nLen; 
                            ny /= nLen; 
                            let tx = -ny; 
                            let ty = nx;
                            if (tx * intendedVx + ty * intendedVy < 0) { 
                                tx = -tx; 
                                ty = -ty; 
                            }
                            this.state = 'evade'; 
                            this.evadeTimer = 500; 
                            this.evadeVec = { x: tx, y: ty };
                        }
                    }
                }
            }
        } else if (physResult.blocked && this.state === 'evade') {
             this.evadeVec.x = -this.evadeVec.x; 
             this.evadeVec.y = -this.evadeVec.y; 
             this.x = originalX; 
             this.y = originalY;
        }

        let repulseX = 0; 
        let repulseY = 0;
        for (let i=0; i<zombies.length; i++) {
            let other = zombies[i];
            if (other === this || other.hp <= 0 || other.state === 'dead_idle') continue; 
            
            let dx = this.x - other.x; 
            let dy = this.y - other.y; 
            let dist = Math.hypot(dx, dy); 
            let overlapDist = (this.size + other.size) * 1.1; 
            
            if (dist > 0 && dist < overlapDist) { 
                let force = (overlapDist - dist) / overlapDist; 
                repulseX += (dx / dist) * force * 2.5; 
                repulseY += (dy / dist) * force * 2.5; 
            }
        }
        this.x += repulseX; 
        this.y += repulseY;

        if (!isTargetingWall && this.state !== 'evade') {
            let tSize = targetEntity.size || 50; 
            if (distToTarget < this.size + tSize && time - this.lastAttackTime > this.attackInterval) {
                this.state = 'move_attack'; 
                this.frameX = 0; 
                this.frameTimer = 0; 
                let dmg = Math.floor(Math.random() * (this.maxDmg - this.minDmg + 1)) + this.minDmg; 
                targetEntity.hp -= dmg; 
                this.lastAttackTime = time;
                addDamageText(targetEntity.x, targetEntity.y - 80, `-${dmg}`, '#ff0000', '#ffffff');
                if (targetEntity !== player && targetEntity.hp <= 0) { 
                    addDamageText(targetEntity.x, targetEntity.y, `啊啊啊...`, '#ff0000', '#ffffff'); 
                }
            }
        }
    }

    draw(screenX, screenY) {
        let zGridX = Math.floor(this.x / FOG_TILE_SIZE); 
        let zGridY = Math.floor(this.y / FOG_TILE_SIZE);
        if (!fogSet.has(`${zGridX},${zGridY}`) && gameState !== 'intro') return;

        let s = this.size * 2.5; 
        let shadowYOffset = this.type === 'boss' ? s * 0.35 : 45;
        let shadowRadiusX = this.type === 'boss' ? 70 : 35; 
        let shadowRadiusY = this.type === 'boss' ? 35 : 18;
        
        if (this.state !== 'dead_idle') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; 
            ctx.beginPath(); 
            ctx.ellipse(screenX, screenY + shadowYOffset, shadowRadiusX, shadowRadiusY, 0, 0, Math.PI*2); 
            ctx.fill();
            
            if (this.hp > 0 && gameState !== 'intro') {
                let barWidth = this.type === 'boss' ? 200 : 80; 
                let barOffset = this.type === 'boss' ? 100 : 60;
                ctx.fillStyle = 'red'; 
                ctx.fillRect(screenX - barWidth/2, screenY - barOffset, barWidth, 8); 
                ctx.fillStyle = '#0f0'; 
                ctx.fillRect(screenX - barWidth/2, screenY - barOffset, barWidth * (Math.max(0,this.hp)/this.maxHp), 8);
            }
        }

        ctx.save(); 
        ctx.translate(screenX, screenY);
        if (!this.facingRight) {
            ctx.scale(-1, 1);
        }

        let drawState = (this.state === 'chase' || this.state === 'wander' || this.state === 'evade') ? 'run' : this.state;
        
        if (this.type === 'siege' || this.type === 'normal1') {
            let img = ASSETS[`zombie1_${drawState}`];
            if (img && img.complete && img.naturalWidth > 0) {
                let frameLimits = { 'idle': 1, 'run': 5, 'move_attack': 8, 'stay_attack': 6, 'death': 7, 'dead_idle': 1 };
                let maxFrames = frameLimits[drawState] || 1; 
                let spriteW = Math.floor(img.naturalWidth / maxFrames); 
                let spriteH = img.naturalHeight; 
                let safeFrame = this.frameX % maxFrames; 
                
                ctx.drawImage(
                    img, 
                    Math.floor(safeFrame * spriteW), 0, 
                    spriteW, spriteH, 
                    -s/2, -s/2, 
                    s, s
                );
            } else { 
                ctx.fillStyle = this.hp > 0 ? '#00cc00' : '#333'; 
                ctx.beginPath(); 
                ctx.arc(0, 0, this.size, 0, Math.PI*2); 
                ctx.fill(); 
            }
        } else {
            let img = ASSETS[this.type === 'normal2' ? 'zombie2' : 'boss'];
            if (img && img.complete && img.naturalWidth > 0) { 
                ctx.drawImage(img, -s/2, -s/2, s, s); 
            } else { 
                ctx.fillStyle = this.hp > 0 ? (this.type === 'boss' ? '#800080' : '#006400') : '#333'; 
                ctx.beginPath(); 
                ctx.arc(0, 0, this.size, 0, Math.PI*2); 
                ctx.fill(); 
            }
        }
        ctx.restore();
    }
}

class Bullet {
    constructor(startX, startY, target) {
        this.x = startX; 
        this.y = startY; 
        let dx = target.x - startX; 
        let dy = target.y - startY; 
        let dist = Math.hypot(dx, dy);
        this.vx = (dx / dist) * 35; 
        this.vy = (dy / dist) * 35; 
        this.damage = Math.floor(Math.random() * 11) + 10; 
        this.life = 100;
    }
    update() {
        this.x += this.vx; 
        this.y += this.vy; 
        this.life--;
        for (let i=0; i<zombies.length; i++) {
            let z = zombies[i];
            if (z.hp > 0 && z.state !== 'dead_idle' && Math.hypot(z.x - this.x, z.y - this.y) < z.size + 20) {
                z.hp -= this.damage; 
                z.x += this.vx * (z.type === 'boss' ? 0.1 : 0.8); 
                z.y += this.vy * (z.type === 'boss' ? 0.1 : 0.8);
                addDamageText(z.x, z.y - z.size - 20, `-${this.damage}`, '#ffa500', '#5c4033'); 
                this.life = 0; 
                break;
            }
        }
    }
    draw(screenX, screenY) {
        if (ASSETS.bullet && ASSETS.bullet.complete && ASSETS.bullet.naturalWidth > 0) {
            let angle = Math.atan2(this.vy, this.vx); 
            ctx.save(); 
            ctx.translate(screenX, screenY); 
            ctx.rotate(angle); 
            ctx.drawImage(ASSETS.bullet, -20, -10, 40, 20); 
            ctx.restore(); 
        } else { 
            ctx.fillStyle = 'yellow'; 
            ctx.beginPath(); 
            ctx.arc(screenX, screenY, 10, 0, Math.PI*2); 
            ctx.fill(); 
        }
    }
}

/** ==========================================
 * 这次补上了箭头绘制辅助函数！
 * ========================================== */
function drawArrowTo(targetX, targetY, text, cx, cy, time) {
    let angle = Math.atan2(targetY - player.y, targetX - player.x); 
    let dist = Math.hypot(targetX - player.x, targetY - player.y);
    
    if (dist > 250) {
        ctx.save(); 
        ctx.translate(cx, cy); 
        ctx.rotate(angle); 
        let arrowScale = 1 + 0.1 * Math.sin(time / 150); 
        ctx.scale(arrowScale, arrowScale);
        
        ctx.fillStyle = 'rgba(0, 255, 200, 0.8)'; 
        ctx.beginPath(); 
        ctx.moveTo(180, -15); 
        ctx.lineTo(180, 15); 
        ctx.lineTo(220, 0); 
        ctx.fill(); 
        ctx.restore(); 
        
        ctx.fillStyle = '#00ffcc'; 
        ctx.font = 'bold 48px sans-serif'; // 【自适应修复】
        ctx.textAlign = 'center'; 
        ctx.fillText(text, cx, 150); 
        ctx.textAlign = 'left';
    }
}

function getMappedPos(e) { 
    const touch = e.touches ? e.touches[0] : e; 
    const rect = canvas.getBoundingClientRect(); 
    return { 
        x: (touch.clientX - rect.left) * (canvas.width / rect.width), 
        y: (touch.clientY - rect.top) * (canvas.height / rect.height) 
    }; 
}

function handleStart(e) { 
    if (gameState === 'intro') return; 
    if (gameState === 'tutorial') { 
        gameState = 'playing'; 
        player.lastShotTime = performance.now(); 
        tutorialPhase = 'kill_2_zombies'; 
        showCenterAlert("🔫 获得武器！请击杀周围 2 只丧尸以确认安全！", "#ffcc00", 5000); 
    }
    const pos = getMappedPos(e); 
    if (gameState === 'playing') {
        let targetObj = null; 
        let btnX = 0; 
        let btnY = 0;
        
        if (activeTowerToRepair) { 
            targetObj = activeTowerToRepair; 
            btnX = activeTowerToRepair.x - player.x + (width/2); 
            btnY = activeTowerToRepair.y - player.y + (height/2) + 60; 
        }
        
        if (targetObj && Math.abs(pos.x - btnX) <= 130 && Math.abs(pos.y - btnY) <= 35) { 
            targetObj.state = 'repairing'; 
            return; 
        } else if (targetObj) { 
            addDamageText(player.x, player.y - 100, "离太远了!", '#ffcc00', null); 
            return; 
        }
    }
    joystick.active = true; 
    joystick.startX = pos.x; 
    joystick.startY = pos.y; 
    joystick.vectorX = 0; 
    joystick.vectorY = 0; 
}

function handleMove(e) {
    if (!joystick.active) return;
    const pos = getMappedPos(e); 
    let dx = pos.x - joystick.startX; 
    let dy = pos.y - joystick.startY; 
    let dist = Math.hypot(dx, dy);
    
    if (dist > joystick.maxRadius) { 
        dx = (dx / dist) * joystick.maxRadius; 
        dy = (dy / dist) * joystick.maxRadius; 
    }
    joystick.vectorX = dx / joystick.maxRadius; 
    joystick.vectorY = dy / joystick.maxRadius;
}

function handleEnd() { 
    joystick.active = false; 
    joystick.vectorX = 0; 
    joystick.vectorY = 0; 
}

canvas.addEventListener('mousedown', handleStart); 
window.addEventListener('mousemove', handleMove); 
window.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchstart', handleStart, {passive: false}); 
window.addEventListener('touchmove', handleMove, {passive: false}); 
window.addEventListener('touchend', handleEnd);

function seededRandom(seed) { 
    let x = Math.sin(seed) * 10000; 
    return x - Math.floor(x); 
}

function generateScene() {
    function isInsideSafeZone(x, y) {
        let tower1X = -250; 
        let tower1Y = 1200; 
        let tower2X = tower1X + GameConfig.tower2.offsetX; 
        let tower2Y = tower1Y + GameConfig.tower2.offsetY;
        
        let minX = Math.min(tower1X, tower2X) - 600; 
        let maxX = Math.max(tower1X, tower2X) + 600;
        let minY = Math.min(tower1Y, tower2Y) - 700; 
        let maxY = Math.max(tower1Y, tower2Y) + 500;
        
        let insideBase = x >= minX && x <= maxX && y >= minY && y <= maxY;
        let distToPlayerSpawn = Math.hypot(x - 0, y - 0);
        let insideSpawnClearance = distToPlayerSpawn < 300;
        
        return insideBase || insideSpawnClearance;
    }

    function isInsideZombiePath(x, y) {
        let px1 = -100; let py1 = 1100; 
        let px2 = 1500; let py2 = 1900; 
        let l2 = Math.pow(px2 - px1, 2) + Math.pow(py2 - py1, 2); 
        if (l2 === 0) return false;
        
        let t = Math.max(0, Math.min(1, ((x - px1) * (px2 - px1) + (y - py1) * (py2 - py1)) / l2));
        let projX = px1 + t * (px2 - px1); 
        let projY = py1 + t * (py2 - py1);
        let dist = Math.hypot(x - projX, y - projY); 
        return dist < 200; 
    }

    let seed = 1337;

    for (let i = 0; i < 30; i++) { 
        let cx = -1500 + seededRandom(seed++) * 1200; 
        let cy = -1400 + seededRandom(seed++) * 1800; 
        if (isInsideSafeZone(cx, cy)) continue;
        
        let clusterTreeCount = Math.floor(seededRandom(seed++) * 4) + 1; 
        let clusterRadius = 50 + seededRandom(seed++) * 80; 
        
        for (let j = 0; j < clusterTreeCount; j++) {
            let angle = seededRandom(seed++) * Math.PI * 2; 
            let dist = seededRandom(seed++) * clusterRadius;
            let tx = cx + Math.cos(angle) * dist; 
            let ty = cy + Math.sin(angle) * dist;
            
            if (tx < -1500) tx = -1500; 
            if (tx > -300) tx = -300;
            if (isInsideSafeZone(tx, ty)) continue;
            
            sceneParts.push(new ScenePart(seededRandom(seed++) > 0.5 ? 'tree1' : 'tree2', tx, ty));
        }
    }

    for (let i = 0; i < 50; i++) { 
        let cx = 800 + seededRandom(seed++) * 1000; 
        let cy = 700 + seededRandom(seed++) * 1200;  
        if (isInsideSafeZone(cx, cy) || isInsideZombiePath(cx, cy)) continue;
        
        let clusterTreeCount = Math.floor(seededRandom(seed++) * 5) + 2; 
        let clusterRadius = 40 + seededRandom(seed++) * 30; 
        
        for (let j = 0; j < clusterTreeCount; j++) {
            let angle = seededRandom(seed++) * Math.PI * 2; 
            let dist = seededRandom(seed++) * clusterRadius;
            let tx = cx + Math.cos(angle) * dist; 
            let ty = cy + Math.sin(angle) * dist;
            
            if (tx < 800) tx = 800; 
            if (tx > 1800) tx = 1800;
            if (isInsideSafeZone(tx, ty) || isInsideZombiePath(tx, ty)) continue;
            
            sceneParts.push(new ScenePart(seededRandom(seed++) > 0.5 ? 'tree1' : 'tree2', tx, ty));
        }
    }

    for (let i = 0; i < 8; i++) { 
        let tPos = seededRandom(seed++); 
        let cx = -100 + tPos * 1600; 
        let cy = 1100 + tPos * 800;  
        cx += (seededRandom(seed++) - 0.5) * 300; 
        cy += (seededRandom(seed++) - 0.5) * 300;
        
        if (isInsideSafeZone(cx, cy)) continue;
        let clusterTreeCount = Math.floor(seededRandom(seed++) * 2) + 1; 
        let clusterRadius = 20 + seededRandom(seed++) * 20; 
        
        for (let j = 0; j < clusterTreeCount; j++) {
            let angle = seededRandom(seed++) * Math.PI * 2; 
            let dist = seededRandom(seed++) * clusterRadius;
            let tx = cx + Math.cos(angle) * dist; 
            let ty = cy + Math.sin(angle) * dist;
            
            if (isInsideSafeZone(tx, ty)) continue;
            sceneParts.push(new ScenePart(seededRandom(seed++) > 0.5 ? 'tree1' : 'tree2', tx, ty));
        }
    }

    let scatterConfig = [
        { type: 'tree3', count: 30 }, { type: 'tree4', count: 30 },
        { type: 'bush1', count: 40 }, { type: 'bush2', count: 40 },
        { type: 'grass', count: 100 }, 
        { type: 'stone1', count: 25 }, { type: 'stone2', count: 20 }, { type: 'stone3', count: 15 },
        { type: 'car1', count: 2 }, { type: 'car2', count: 2 }, { type: 'car3', count: 2 }, 
        { type: 'house1', count: 3 }, { type: 'house2', count: 3 }, 
        { type: 'debris', count: 30 }
    ];

    const RANGE = 3000;
    for (let ci=0; ci<scatterConfig.length; ci++) {
        let c = scatterConfig[ci];
        for(let i=0; i<c.count; i++) {
            let tx = (seededRandom(seed++) - 0.5) * RANGE * 2; 
            let ty = (seededRandom(seed++) - 0.5) * RANGE * 2;
            if (isInsideSafeZone(tx, ty) || isInsideZombiePath(tx, ty)) continue; 
            sceneParts.push(new ScenePart(c.type, tx, ty));
        }
    }
}

/** ==========================================
 * 初始化与防崩溃循环
 * ========================================== */
let lastTime = performance.now(); 
let activeTowerToRepair = null;

function initGame() {

    totalResourcesCollected = 0; 
    wallResourcesCollected = 0; 
    kills = 0;

    tower = new Tower(player.x - 250, player.y + 1200, "1号防线");
